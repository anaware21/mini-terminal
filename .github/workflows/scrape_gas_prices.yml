name: Scrape Gas Prices

on:
  schedule:
    - cron: '0 17 * * *'  # daily at 9am PST (UTC-8)
  workflow_dispatch:       # allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright Firefox
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-firefox-${{ runner.os }}

      - name: Install Firefox
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          playwright install firefox
          playwright install-deps firefox

      - name: Install Firefox system deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps firefox

      - name: Run scraper and upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        working-directory: gas_scraping
        run: python upload.py
